<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/estilos.css">
    <title>Google</title>
</head>
<body>
    <header>
        <nav>
            <div class="menus">
                <ul>
                    <li><a href="#" class="menu_link">Gmail</a></li>
                    <li><a href="#" class="menu_link">Imagens</a></li>
                    <li class="menu_grid"><a href="#"><i class="bi bi-grid-3x3-gap-fill"></i></a></li>
                    <li><a href="#" class="menu_button">Fazer login</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <section id="main">
        <div class="logo">
            <img src="assets/images/logo.png" alt="">
        </div>
        <div class="form_main">
            <form action="#" method="get">
                <div class="search_icon">
                    <i class="bi bi-search"></i>
                </div>
                <input type="text" name="search" id="search">
                <div class="search_options">
                    <div class="keyboard">
                        <i class="bi bi-keyboard"></i>
                    </div>
                    <div class="microphone">
                        <i class="bi bi-mic-fill"></i>
                    </div>
                </div>
            </form>
        </div>
        <div class="buttons">
            <div class="button">
                <a href="#" class="btn">Pesquisa Google</a>
            </div>
            <div class="button">
                <a href="#" class="btn">Estou com sorte</a>
            </div>
        </div>
    </section>
    <section id="localization">
        <div class="country">Brasil</div>
    </section>
    <footer>
        <ul>
            <li>Sobre</li>
            <li>Publicidade</li>
            <li>Negócios</li>
            <li>Como funciona a Pesquisa</li>
        </ul>
        <ul>
            <li>Privacidade</li>
            <li>Termos</li>
            <li>Configurações</li>
        </ul>
    </footer>
</body>
</html>
